---
layout: default
title: Posts
---
<h1>Posts</h1>

<!-- This list is generated from the files in _posts/ — newest first, automatically. -->
<ul class="postlist">
{% for post in site.posts %}
  <li>
    <a href="{{ post.url }}">{{ post.title }}</a>
    <span class="date">&mdash; {{ post.date | date: "%Y-%m-%d" }}</span>
    {% if post.summary %}<div class="summary">{{ post.summary }}</div>{% endif %}
    {% if post.tags %}<div class="tag">{{ post.tags }}</div>{% endif %}
  </li>
{% endfor %}
</ul>
